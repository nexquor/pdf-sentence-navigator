<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Sentence Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Theming System ── */
    :root {
      /* Default Light Theme */
      --bg-sidebar: #ffffff;
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      
      --text-sidebar-heading: #64748b;
      --text-sidebar-main: #1e293b;
      --text-sidebar-muted: #64748b;
      
      --text-main: #1e293b;
      --text-muted: #64748b;
      
      --border-color: #e2e8f0;
      --border-sidebar: #e2e8f0;
      
      --sidebar-nav-bg: #f1f5f9;
      --sidebar-nav-border: #e2e8f0;
      
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --highlight-color: rgba(59, 130, 246, 0.35); /* default blue */

      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    body.theme-dark {
      --bg-sidebar: #0f172a;
      --bg-main: #0b1120;
      --bg-card: #1e293b;
      
      --text-sidebar-heading: #64748b;
      --text-sidebar-main: #f1f5f9;
      --text-sidebar-muted: #94a3b8;
      
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      
      --border-color: #334155;
      --border-sidebar: #1e293b;
      
      --sidebar-nav-bg: rgba(255, 255, 255, 0.05);
      --sidebar-nav-border: rgba(255, 255, 255, 0.05);
      
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --highlight-color: rgba(96, 165, 250, 0.4);
      
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
    }

    /* ── Base Styles ── */
    body {
      margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-main);
      color: var(--text-main);
      transition: background 0.3s, color 0.3s;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-sidebar);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      box-sizing: border-box;
      color: var(--text-sidebar-main);
      overflow-y: auto;
      transition: margin-left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body.sidebar-collapsed #sidebar {
      margin-left: -280px;
    }

    body:not(.sidebar-collapsed) #sidebar-toggle-main {
      display: none;
    }

    .sidebar-section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-sidebar-heading);
      margin-bottom: 12px;
    }

    /* Navigation Row */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--sidebar-nav-bg);
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      border: 1px solid var(--sidebar-nav-border);
    }

    .nav-row.transparent {
      background: transparent;
      border-color: transparent;
    }

    .nav-key { font-weight: 600; }
    .nav-action { color: var(--accent); font-weight: 500; }
    .nav-action.muted { color: var(--text-sidebar-muted); }

    /* Progress Stats */
    #progress-text {
      font-size: 32px;
      font-weight: 500;
      line-height: 1;
      margin-bottom: 4px;
      color: var(--accent);
    }

    #progress-subtitle {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-sidebar-muted);
      margin-bottom: 16px;
    }

    .progress-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Active Sentence Preview */
    #active-sentence-text {
      font-size: 13px;
      line-height: 1.5;
      font-style: italic;
      color: var(--text-sidebar-heading);
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      min-height: 40px;
    }

    /* ── Main Content Area ── */
    #main-content {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Top Floating Buttons */
    #sidebar-toggle {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 100;
      padding: 8px;
    }

    #floating-widget {
      position: absolute;
      top: 24px;
      right: 32px;
      z-index: 100;
    }

    .widget-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }

    .widget-btn:hover {
      border-color: var(--accent);
    }

    /* Popover Menu */
    .widget-popover {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      width: 260px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      box-shadow: var(--shadow);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .widget-popover.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .popover-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 500;
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 24px;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border-color);
      transition: .3s; border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute; content: "";
      height: 18px; width: 18px; left: 3px; bottom: 3px;
      background-color: white;
      transition: .3s; border-radius: 50%;
    }
    input:checked + .toggle-slider { background-color: var(--accent); }
    input:checked + .toggle-slider:before { transform: translateX(16px); }

    /* Color Swatches */
    .color-swatches {
      display: flex; gap: 8px;
    }
    .swatch {
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }
    .swatch:hover { transform: scale(1.1); }
    .swatch.active { border-color: var(--text-main); }
    
    .swatch-blue { background: #3b82f6; }
    .swatch-yellow { background: #eab308; }
    .swatch-green { background: #10b981; }
    .swatch-red { background: #ef4444; }

    .popover-footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }

    .badge-local {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    /* ── PDF Rendering Area ── */
    #pdf-wrapper {
      flex: 1;
      overflow: auto;
      padding: 80px 40px 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      scroll-behavior: smooth;
    }

    .page-container {
      position: relative;
      margin-bottom: 24px;
      background: white; /* Pages are always white */
      box-shadow: var(--shadow);
      border-radius: 4px;
      overflow: hidden;
    }

    canvas { display: block; }

    .textLayer {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden;
    }

    .textLayer span {
      color: transparent; position: absolute;
      white-space: pre; cursor: text; transform-origin: 0% 0%;
    }

    /* Dynamic Highlight Color */
    ::highlight(sentence-highlight) {
      background-color: var(--highlight-color);
      color: transparent;
    }

    /* ── Toast Container ── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 10px; z-index: 1000;
    }

    .toast {
      padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
      color: #fff; background: #333; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      transform: translateX(120%); transition: transform 0.3s, opacity 0.3s; opacity: 0;
    }
    .toast.show { transform: translateX(0); opacity: 1; }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
    .toast.loading { background: #3b82f6; }

    /* Hidden file input */
    #file-input { display: none; }
  </style>
  <script src="pdf.min.js"></script>
  <script type="module" src="viewer.js"></script>
</head>
<body>
  
  <!-- Left Sidebar -->
  <div id="sidebar">
    <div class="sidebar-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <div class="section-title" style="margin: 0;">Navigation</div>
        <button id="sidebar-toggle-inside" class="widget-btn" title="Toggle Sidebar" style="padding: 6px; box-shadow: none; background: transparent; border: none; color: var(--text-sidebar-muted);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
      <div class="nav-row">
        <span class="nav-key">TAB</span>
        <span class="nav-action">Next</span>
      </div>
      <div class="nav-row transparent">
        <span class="nav-key">⇧ + TAB</span>
        <span class="nav-action muted">Prev</span>
      </div>
      <!-- Upload button moved to main content area -->
    </div>

    <div class="sidebar-section">
      <div class="section-title">Document Stats</div>
      <div id="progress-text">0 / 0</div>
      <div id="progress-subtitle" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-sidebar-muted); margin-top: 4px; margin-bottom: 8px;">Sentence Progress</div>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>

    <div class="sidebar-section" style="flex: 1; display: flex; flex-direction: column;">
      <div class="section-title">Active Sentence</div>
      <div id="active-sentence-text">
        "Load a PDF document to begin navigating sentences..."
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    
    <!-- Top Left Controls -->
    <div id="top-left-controls" style="position: absolute; top: 24px; left: 24px; z-index: 100; display: flex; gap: 12px; align-items: center;">
      <!-- Sidebar Toggle Button -->
      <button id="sidebar-toggle-main" class="widget-btn" title="Toggle Sidebar" style="position: static; padding: 10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>

      <!-- Manual Upload Button -->
      <button id="upload-btn" class="widget-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        Open PDF
      </button>
      <input type="file" id="file-input" accept="application/pdf" />
    </div>

    <!-- Floating Top-Right Widget -->
    <div id="floating-widget" style="display: flex; gap: 12px; align-items: center;">
      <!-- Page Indicator -->
      <div id="page-indicator" style="font-size: 13px; font-weight: 600; color: var(--text-muted); background: var(--bg-card); padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border-color); box-shadow: var(--shadow); display: none;">
        Page 1 / ?
      </div>

      <button id="widget-toggle" class="widget-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        PDF Navigator
      </button>

      <div id="widget-menu" class="widget-popover">
        <div class="popover-row">
          <span>Dark Theme</span>
          <label class="toggle-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div style="margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">
          Highlight Color
        </div>
        <div class="color-swatches" style="margin-bottom: 16px;">
          <div class="swatch swatch-blue active" data-color="rgba(59, 130, 246, 0.4)"></div>
          <div class="swatch swatch-yellow" data-color="rgba(234, 179, 8, 0.4)"></div>
          <div class="swatch swatch-green" data-color="rgba(16, 185, 129, 0.4)"></div>
          <div class="swatch swatch-red" data-color="rgba(239, 68, 68, 0.4)"></div>
        </div>

        <div style="margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">
          Current Source
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.05); padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border-color);">
          <span id="pdf-source-url" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; color: var(--text-main); flex: 1; margin-right: 8px; cursor: help;" title="Local File">Local File</span>
          <button id="copy-url-btn" style="background: transparent; border: none; cursor: pointer; color: var(--text-muted); display: none; padding: 2px;" title="Copy URL">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
        </div>

        <div class="popover-footer">
          <span id="app-version">v1.1.0 (Manifest V3)</span>
          <span class="badge-local">Local Processing</span>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Document Rendering -->
    <div id="pdf-wrapper">
      <div id="pdf-container"></div>
    </div>

  </div>

</body>
</html>
